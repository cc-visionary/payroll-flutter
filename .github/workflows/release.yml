name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.1.0). Defaults to tag.'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # 1. Engine parity + unit tests must pass before we build any artifacts.
  #    Analyze is intentionally loose (no-fatal-infos + no-fatal-warnings)
  #    so legacy PH-payroll enum names (REGULAR_HOLIDAY, OT_REGULAR, etc.)
  #    don't gate releases over lint-level issues. The CI workflow can
  #    still run analyze in strict mode when desired.
  # -----------------------------------------------------------------------
  test:
    name: engine parity + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # -----------------------------------------------------------------------
  # 2. Build Windows .exe + Android .apk in parallel.
  #    macOS / Linux / iOS are intentionally OUT OF SCOPE for V1 — add them
  #    back when those channels are requested by Finance.
  # -----------------------------------------------------------------------
  build-windows:
    name: build Windows installer
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # In-app "Check for Updates" reads this JSON; GitHub's
      # /releases/latest/download redirector always points at the newest
      # published release, so the URL stays constant across versions.
      UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/version.json
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Enable Windows desktop
        shell: bash
        run: flutter config --enable-windows-desktop

      - name: Pub get
        run: flutter pub get

      - name: Build Windows release
        shell: bash
        run: |
          flutter build windows --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Package installer (.exe)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
            /DVersion=${{ steps.ver.outputs.version }} `
            installer\windows\payroll_flutter.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PayrollFlutter-Windows-${{ steps.ver.outputs.version }}
          path: dist/PayrollFlutter-Setup-v${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

  build-android:
    name: build Android APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/version.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Pub get
        run: flutter pub get

      # V1 ships a debug-signed APK for internal side-loading via adb.
      # Upgrade to a real keystore + `flutter build appbundle` before
      # uploading to the Play Store. See installer/android/README.md for
      # the keystore setup when you're ready.
      - name: Build APK (release, debug-signed for V1)
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=UPDATE_MANIFEST_URL=$UPDATE_MANIFEST_URL \
            --build-name=${{ steps.ver.outputs.version }}

      - name: Stage APK artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/PayrollFlutter-${{ steps.ver.outputs.version }}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: PayrollFlutter-Android-${{ steps.ver.outputs.version }}
          path: dist/PayrollFlutter-${{ steps.ver.outputs.version }}.apk
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # 3. Build the version.json manifest that the in-app updater reads.
  #    Uploaded as a release asset so its URL becomes
  #    https://github.com/<org>/<repo>/releases/latest/download/version.json
  #    — stable across versions thanks to GitHub's "latest" redirector.
  # -----------------------------------------------------------------------
  manifest:
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Write version.json
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p manifest
          # Pull release notes from the tag annotation (falls back to a
          # one-liner if the tag wasn't annotated).
          NOTES=$(git tag -l --format='%(contents)' "$TAG" | head -c 4000 || echo '')
          if [ -z "$NOTES" ]; then
            NOTES="Payroll Flutter ${VERSION}"
          fi
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg released "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg windows "${BASE}/PayrollFlutter-Setup-v${VERSION}.exe" \
            --arg android "${BASE}/PayrollFlutter-${VERSION}.apk" \
            '{
              version: $version,
              releaseNotes: $notes,
              releasedAt: $released,
              platforms: {
                windows: { url: $windows },
                android: { url: $android }
              },
              stores: {}
            }' > manifest/version.json
          cat manifest/version.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayrollFlutter-Manifest-${{ steps.ver.outputs.version }}
          path: manifest/version.json
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # 4. Attach all three artifacts (.exe, .apk, version.json) to the tag's
  #    GitHub Release.
  # -----------------------------------------------------------------------
  release:
    needs: [build-windows, build-android, manifest]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
